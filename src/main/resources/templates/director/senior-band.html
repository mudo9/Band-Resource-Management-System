<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
<head>
  <title>Senior Band</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100">
  <div th:replace="~{fragments/headerDirector.html :: header}"></div>

    <h1 class="text-center">Senior Band - Director</h1>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
      <span th:text="${successMessage}">User promoted successfully</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
      <span th:text="${errorMessage}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="mx-3 d-flex">
      <h1 class="flex-fill">Band Members</h1>
      <div class="align-self-center">
        <a class="btn btn-outline-dark btn-lg" th:href="@{/director/senior-band/new}">Add User to Senior Band</a>
      </div>
    </div>

    <div class="table-responsive p-5">
      <table class="table table-secondary table-hover">
        <thead>
        <tr>
          <th scope="col">#</th>
          <th scope="col">Name</th>
          <th scope="col">Email</th>
          <th scope="col">Phone Number</th>
        </tr>
        </thead>
        <tbody class="table-group-divider">
        <tr class="table-light" th:each="user : ${users}">
          <th scope="col">
            <a th:href="@{senior-band/{id}(id=${user.id})}" th:text="${user.id}">1</a>
          </th>
          <td th:text="${user.fullName}">John Doe</td>

          <td th:if="${user.getParentRelationship() == null}" th:text="${user.email}">john.doe@example.com</td>
          <td th:unless="${user.getParentRelationship() == null}"
              th:text="${user.getEffectiveEmail() + '(Parent Email)'}">
            john.doe@example.com</td>
          <td th:if="${user.getParentRelationship() == null}" th:text="${user.phoneNumber}">john.doe@example.com</td>
          <td th:unless="${user.getParentRelationship() == null}"
              th:text="${user.getEffectivePhoneNumber() + '(Parent Phone Number)'}">
            john.doe@example.com</td>
        </tr>
        </tbody>
      </table>
    </div>

  <div th:replace="~{fragments/footer.html :: footer}"></div>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.min.js"></script>
</body>
</html>
