<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Training Band Member Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>
<div class="container mt-5">
    <h1>Training Band Member Details</h1>
    <div th:if="${bandMember==null}">
        <p>Error: bandMember not found!</p>
        <a class="btn btn-primary" href="/director/training-band">Back to Training Band Members</a>
    </div>
    <div th:unless="${bandMember==null}">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Training Band Member Information</h5>
                <p>Name - <span th:text="${bandMember.fullName}"></span></p>
                <div th:if="${bandMember.getParentRelationship() == null}">
                    <p>Email - <span th:text="${bandMember.email}"></span></p>
                    <p>Phone Number - <span th:text="${bandMember.phoneNumber}"></span></p>
                </div>
                <div th:unless="${bandMember.getParentRelationship() == null}">
                    <p>Parent Name - <span
                            th:text="${bandMember.parentRelationship.parent.fullName + '(Parent Email)'} "></span></p>
                    <p>Email - <span th:text="${bandMember.getEffectiveEmail() + '(Parent Email)'} "></span></p>
                    <p>Phone Number - <span
                            th:text="${bandMember.getEffectivePhoneNumber() + '(Parent Phone Number)'}"></span></p>
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <button type="button" id="deleteTrainingBandMemberButton" class="btn btn-danger"
                            th:data-id="${bandMember.id}">Delete Member From Training Band</button>
                    <a class="btn btn-primary" href="/director/training-band">Back to Training Band Members</a>
                </div>
            </div>
        </div>

    </div>

</div>
<script th:src="@{/js/trainingBand.js}"></script>
</body>
</html>
